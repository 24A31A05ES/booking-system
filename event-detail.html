<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PEC — Event Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0F0720;--surface:#1E0A3C;--surface2:#2D1B69;
      --green:#10B981;--green-dark:#065F46;
      --white:rgba(255,255,255,0.9);--muted:rgba(255,255,255,0.45);
      --border:rgba(255,255,255,0.1);
    }
    html{scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;}

    /* ORBS */
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
    .orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(76,29,149,0.4),transparent 70%);top:-100px;left:-100px;}
    .orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(6,78,59,0.4),transparent 70%);bottom:0;right:0;}

    /* NAVBAR */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 60px;background:rgba(15,7,32,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .nav-logo{height:46px;width:auto;object-fit:contain;}
    .nav-fallback{width:42px;height:42px;background:var(--green-dark);border-radius:50%;display:none;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:0.85rem;color:#fff;border:2px solid var(--green);}
    .nav-college-name{font-family:'Syne',sans-serif;font-size:0.88rem;font-weight:700;color:#fff;}
    .nav-college-sub{font-size:0.62rem;color:var(--muted);}
    .nav-links{display:flex;align-items:center;gap:4px;}
    .nav-links a{text-decoration:none;color:rgba(255,255,255,0.7);font-weight:500;font-size:0.85rem;padding:7px 14px;border-radius:50px;transition:all 0.2s;}
    .nav-links a:hover{color:#fff;background:rgba(255,255,255,0.08);}
    .nav-links .btn-reg{background:var(--green-dark);color:#fff!important;border:1px solid var(--green);padding:8px 18px;font-weight:600;}

    /* BACK BUTTON */
    .back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:0.85rem;font-weight:600;text-decoration:none;padding:8px 16px;border-radius:50px;border:1px solid var(--border);background:rgba(255,255,255,0.04);transition:all 0.2s;margin-bottom:28px;}
    .back-btn:hover{color:#fff;border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);}

    /* MAIN LAYOUT */
    .detail-page{padding:100px 60px 60px;position:relative;z-index:1;max-width:1100px;margin:0 auto;}

    /* HERO CARD */
    .detail-hero{display:flex;gap:40px;margin-bottom:48px;align-items:flex-start;}

    .detail-img-wrap{width:420px;flex-shrink:0;border-radius:24px;overflow:hidden;border:1px solid var(--border);background:var(--surface2);aspect-ratio:4/3;}
    .detail-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
    .detail-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;background:var(--surface2);}

    .detail-info{flex:1;}

    .detail-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .badge-pill{font-size:0.72rem;font-weight:700;padding:5px 14px;border-radius:20px;color:#fff;letter-spacing:0.4px;}

    .detail-title{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;color:#fff;line-height:1.15;margin-bottom:20px;}

    .detail-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;}
    .meta-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;}
    .meta-label{font-size:0.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
    .meta-value{font-size:0.92rem;font-weight:600;color:#fff;}

    .detail-desc-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:10px;}
    .detail-desc{font-size:0.95rem;color:rgba(255,255,255,0.6);line-height:1.75;margin-bottom:28px;}

    .btn-register-big{display:block;width:100%;text-align:center;padding:16px 28px;border-radius:50px;font-size:1rem;font-weight:700;text-decoration:none;background:#0F172A;color:#fff;border:1px solid rgba(255,255,255,0.15);cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;}
    .btn-register-big:hover{background:#1E293B;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.5);}
    .btn-coming-big{display:block;width:100%;text-align:center;padding:16px 28px;border-radius:50px;font-size:1rem;font-weight:700;background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);cursor:not-allowed;}

    /* RELATED EVENTS */
    .related-section{margin-top:60px;}
    .related-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:24px;}
    .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
    .related-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;text-decoration:none;display:block;transition:all 0.2s;}
    .related-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,0.2);box-shadow:0 12px 32px rgba(0,0,0,0.4);}
    .related-img{height:120px;overflow:hidden;background:var(--surface2);}
    .related-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s;}
    .related-card:hover .related-img img{transform:scale(1.06);}
    .related-body{padding:12px 14px;}
    .related-name{font-family:'Syne',sans-serif;font-size:0.88rem;font-weight:700;color:#fff;margin-bottom:4px;}
    .related-dept{font-size:0.72rem;color:var(--muted);}

    /* FOOTER */
    .footer{position:relative;z-index:1;border-top:1px solid var(--border);background:var(--surface);margin-top:60px;}
    .footer-top{display:flex;justify-content:space-between;align-items:center;padding:26px 60px;flex-wrap:wrap;gap:16px;}
    .footer-brand{display:flex;align-items:center;gap:12px;}
    .footer-logo{height:40px;width:auto;object-fit:contain;}
    .footer-brand strong{font-family:'Syne',sans-serif;font-size:0.88rem;color:#fff;display:block;}
    .footer-brand p{font-size:0.7rem;color:var(--muted);margin-top:2px;}
    .footer-tagline{font-family:'Syne',sans-serif;font-size:0.88rem;color:var(--green);font-style:italic;}
    .footer-bottom{text-align:center;padding:12px;font-size:0.72rem;color:rgba(255,255,255,0.25);border-top:1px solid var(--border);}

    /* NOT FOUND */
    .not-found{text-align:center;padding:80px 20px;color:var(--muted);}
    .not-found span{font-size:4rem;display:block;margin-bottom:16px;}

    @media(max-width:768px){
      .navbar{padding:10px 16px;}
      .nav-college-sub{display:none;}
      .detail-page{padding:80px 20px 40px;}
      .detail-hero{flex-direction:column;gap:24px;}
      .detail-img-wrap{width:100%;}
      .detail-meta-grid{grid-template-columns:1fr;}
      .detail-title{font-size:1.8rem;}
      .related-grid{grid-template-columns:1fr 1fr;}
      .footer-top{padding:20px;flex-direction:column;align-items:flex-start;}
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <img src="images/pec-logo.png" alt="PEC Logo" class="nav-logo"
           onerror="this.style.display='none';document.getElementById('nf').style.display='flex'"/>
      <div class="nav-fallback" id="nf">PEC</div>
      <div>
        <div class="nav-college-name">Pragati Engineering College</div>
        <div class="nav-college-sub">An Autonomous Institution · NBA &amp; NAAC 'A' Grade</div>
      </div>
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="event.html">Events</a>
      <a href="login.html">Login</a>
      <a href="register.html" class="btn-reg">Register</a>
    </div>
  </nav>

  <!-- DETAIL PAGE -->
  <div class="detail-page" id="detail-page">
    <div class="not-found"><span>⏳</span><p>Loading event...</p></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-top">
      <div class="footer-brand">
        <img src="images/pec-logo.png" alt="PEC Logo" class="footer-logo" onerror="this.style.display='none'"/>
        <div>
          <strong>Pragati Engineering College</strong>
          <p>An Autonomous Institution · NBA &amp; NAAC 'A' Grade</p>
        </div>
      </div>
      <div class="footer-tagline">Learning is Supreme Deity</div>
    </div>
    <div class="footer-bottom">© 2026 Pragati Engineering College. All rights reserved.</div>
  </footer>

  <script src="js/db.js"></script>
  <script>
    const CAT_COLORS = {
      tech:"#10B981", cultural:"#A855F7", festival:"#F59E0B", ncc_nss:"#3B82F6", sports:"#EF4444"
    };
    const SYMP_COLORS = {
      "EPROZYNE":"#1B3A8C","E-JIVE":"#00695C","E-ARTIFACT":"#6A1B9A",
      "EBHIGNA":"#283593","EXULT":"#E65100","EDATUM":"#00838F",
      "EMITRIX":"#AD1457","ELEVER":"#558B2F","ERUDITE":"#4E342E"
    };
    const CAT_LABELS = { tech:"Tech", cultural:"Cultural", festival:"Festival", ncc_nss:"NCC/NSS", sports:"Sports" };
    const CAT_ICONS  = { tech:"💻", cultural:"🎭", festival:"🎉", ncc_nss:"🎗️", sports:"🏆" };

    // ── GET ALL EVENTS ──────────────────────────────
    function getAllEvents() {
      return [
        ...PEC_DB.techEvents.map(e => ({...e, catId:"tech"})),
        ...PEC_DB.culturalEvents.map(e => ({...e, catId:"cultural"})),
        ...PEC_DB.festivalEvents.map(e => ({...e, catId:"festival"})),
        ...PEC_DB.nccNssEvents.map(e => ({...e, catId:"ncc_nss"})),
        ...PEC_DB.sportsEvents.map(e => ({...e, catId:"sports"}))
      ];
    }

    // ── FIND EVENT BY ID ────────────────────────────
    function findEvent(id) {
      return getAllEvents().find(e => e.id === id);
    }

    // ── GET RELATED EVENTS ──────────────────────────
    function getRelated(ev) {
      const all = getAllEvents().filter(e => e.id !== ev.id);
      // Same symposium first, then same category
      const same = all.filter(e => ev.symposium && e.symposium === ev.symposium);
      const sameCat = all.filter(e => e.catId === ev.catId && e.symposium !== ev.symposium);
      return [...same, ...sameCat].slice(0, 3);
    }

    // ── RENDER DETAIL PAGE ──────────────────────────
    function renderDetail(ev) {
      const catColor  = CAT_COLORS[ev.catId] || "#10B981";
      const sympColor = SYMP_COLORS[ev.symposium] || catColor;
      const isComingSoon = !ev.regLink || ev.regLink === "#";

      const related = getRelated(ev);
      const relatedHTML = related.map(r => `
        <a href="event-detail.html?id=${r.id}" class="related-card">
          <div class="related-img">
            <img src="${r.image||''}" alt="${r.name||''}"
                 onerror="this.style.display='none'"/>
          </div>
          <div class="related-body">
            <div class="related-name">${r.name||""}</div>
            <div class="related-dept">${r.dept||r.category||""} · ${r.date||""}</div>
          </div>
        </a>`).join("");

      document.getElementById("detail-page").innerHTML = `
        <a href="event.html" class="back-btn">← Back to Events</a>

        <div class="detail-hero">
          <div class="detail-img-wrap">
            <img src="${ev.image||''}" alt="${ev.name||''}"
                 onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'detail-img-placeholder\\'>${CAT_ICONS[ev.catId]||"🎯"}</div>'"/>
          </div>

          <div class="detail-info">
            <div class="detail-badges">
              ${ev.symposium ? `<span class="badge-pill" style="background:${sympColor};">${ev.symposium}</span>` : ""}
              <span class="badge-pill" style="background:${catColor};">${CAT_LABELS[ev.catId]||""}</span>
            </div>

            <h1 class="detail-title">${ev.name||""}</h1>

            <div class="detail-meta-grid">
              <div class="meta-item">
                <div class="meta-label">Department</div>
                <div class="meta-value">🏛️ ${ev.dept||ev.category||"—"}</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">Date</div>
                <div class="meta-value">📅 ${ev.date||"TBD"}</div>
              </div>
              ${ev.venue ? `
              <div class="meta-item">
                <div class="meta-label">Venue</div>
                <div class="meta-value">📍 ${ev.venue}</div>
              </div>` : ""}
              ${ev.symposium ? `
              <div class="meta-item">
                <div class="meta-label">Symposium</div>
                <div class="meta-value" style="color:${sympColor};">🎓 ${ev.symposium}</div>
              </div>` : ""}
            </div>

            <div class="detail-desc-title">About this Event</div>
            <div class="detail-desc">${ev.desc||""}</div>

            ${isComingSoon
              ? `<div class="btn-coming-big">Registration Coming Soon</div>`
              : `<a href="${ev.regLink}" target="_blank" class="btn-register-big">
                   Register Now →
                 </a>`
            }
          </div>
        </div>

        ${related.length > 0 ? `
        <div class="related-section">
          <div class="related-title">More Events from ${ev.symposium || CAT_LABELS[ev.catId] || "PEC"}</div>
          <div class="related-grid">${relatedHTML}</div>
        </div>` : ""}
      `;

      // Update page title
      document.title = `${ev.name} — PEC Events 2026`;
    }

    // ── INIT ────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");

      if (!id) {
        document.getElementById("detail-page").innerHTML = `
          <div class="not-found">
            <span>🔍</span>
            <p>No event selected.</p>
            <a href="event.html" class="back-btn" style="display:inline-flex;margin-top:20px;">← Back to Events</a>
          </div>`;
        return;
      }

      const ev = findEvent(id);
      if (!ev) {
        document.getElementById("detail-page").innerHTML = `
          <div class="not-found">
            <span>❌</span>
            <p>Event not found.</p>
            <a href="event.html" class="back-btn" style="display:inline-flex;margin-top:20px;">← Back to Events</a>
          </div>`;
        return;
      }

      renderDetail(ev);
    });
  </script>
</body>
</html>
